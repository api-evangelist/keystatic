aid: keystatic
name: Keystatic
description: >-
  Keystatic is an open source, Git-based content management system that
  stores content as Markdown, JSON, and YAML directly in a project's Git
  repository. The Keystatic Reader API is a Node.js library that lets
  applications read Keystatic content from any local directory or GitHub
  repository server-side, supporting frameworks like Next.js, Astro,
  Remix, and React Server Components.
