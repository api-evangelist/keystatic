apis:
  - aid: keystatic:reader-api
    name: Keystatic Reader API
    description: >-
      The Reader API is a server-side Node.js library exposing
      createReader and createGitHubReader functions that let applications
      read Keystatic content from a local directory or GitHub repository.
      The Reader API is a programmatic SDK; it is not exposed as a public
      HTTP REST API.
